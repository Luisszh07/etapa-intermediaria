<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projeto Intermediário — Conversor de Moedas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #00c37a;
      --dark:   #0b0d13;
      --card:   #13161f;
      --inner:  #0d0f18;
      --border: #1e2333;
      --text:   #e8eaf2;
      --muted:  #5a617a;
      --red:    #ff4757;
      --gold:   #c8a84b;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 5rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 8% 15%, rgba(0,195,122,.07) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 92% 85%, rgba(10,60,255,.07) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeDown .7s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .62rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: .3rem 1rem;
      margin-bottom: 1rem;
    }

    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1.08;
      letter-spacing: -.02em;
    }

    h1 .accent { color: var(--green); }

    .subtitle {
      margin-top: .7rem;
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .08em;
    }

    /* ── RATE BAR ── */
    .rate-bar {
      display: flex;
      align-items: center;
      gap: .6rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .45rem 1.1rem;
      margin-bottom: 2rem;
      font-size: .66rem;
      color: var(--muted);
      animation: fadeDown .8s .1s ease both;
      max-width: 640px;
      width: 100%;
      flex-wrap: wrap;
      gap: .5rem .9rem;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 7px var(--green);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    .bar-pair { display:flex; align-items:center; gap:.35rem; }
    .bar-val  { color: var(--text); font-weight:500; }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem 2rem 2.2rem;
      animation: fadeUp .7s .15s ease both;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,195,122,.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── SELECTORS ROW ── */
    .selectors-row {
      display: grid;
      grid-template-columns: 1fr 44px 1fr;
      align-items: end;
      gap: .8rem;
      margin-bottom: 1.4rem;
    }

    .selector-wrap { position: relative; }

    .selector-label {
      font-size: .58rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: .5rem;
    }

    .selector-btn {
      width: 100%;
      background: var(--inner);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: .75rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .65rem;
      transition: border-color .2s;
      color: var(--text);
      text-align: left;
    }

    .selector-btn:hover { border-color: #2e3550; }
    .selector-btn.open  { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,195,122,.07); }

    .flag-md {
      width: 34px; height: 24px;
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,.5);
    }

    .flag-md svg { width:100%; height:100%; display:block; }

    .sel-info { flex: 1; }
    .sel-code { font-family:'Syne',sans-serif; font-size:.95rem; font-weight:700; }
    .sel-name { font-size:.6rem; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-top:.05rem; }
    .sel-arrow { color:var(--muted); font-size:.7rem; transition: transform .2s; }
    .selector-btn.open .sel-arrow { transform:rotate(180deg); }

    /* DROPDOWN */
    .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #181b27;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 16px 40px rgba(0,0,0,.6);
    }

    .dropdown.open { display: block; animation: dropIn .18s ease; }

    .dd-item {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .65rem 1rem;
      cursor: pointer;
      transition: background .15s;
    }

    .dd-item:hover    { background: rgba(255,255,255,.04); }
    .dd-item.active   { background: rgba(0,195,122,.08); }

    .flag-sm {
      width: 28px; height: 20px;
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.5);
    }

    .flag-sm svg { width:100%; height:100%; display:block; }

    .dd-code { font-family:'Syne',sans-serif; font-weight:700; font-size:.85rem; min-width: 2.8rem; }
    .dd-name { font-size:.62rem; color:var(--muted); }

    /* SWAP */
    #swap-btn {
      background: var(--inner);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 44px; height: 44px;
      display: grid; place-items: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: color .2s, border-color .2s, transform .35s, background .2s;
      margin-bottom: 0;
    }

    #swap-btn:hover {
      color: var(--green);
      border-color: var(--green);
      background: rgba(0,195,122,.07);
      transform: rotate(180deg);
    }

    /* ── INPUT ROW ── */
    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.4rem;
    }

    .amount-field {
      background: var(--inner);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: .85rem 1rem;
      transition: border-color .2s, box-shadow .2s;
    }

    .amount-field:focus-within {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,195,122,.06);
    }

    .amount-field label {
      font-size: .57rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      display: block;
      margin-bottom: .4rem;
    }

    .amount-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: .04em;
    }

    .amount-input::placeholder { color: #252838; }
    .amount-input::-webkit-outer-spin-button,
    .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .amount-input[type=number] { -moz-appearance: textfield; }

    /* ── RESULT ── */
    .result-wrap {
      background: var(--inner);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: .85rem 1rem;
    }

    .result-wrap label {
      font-size: .57rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      display: block;
      margin-bottom: .4rem;
    }

    #result-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: .04em;
      color: var(--green);
      min-height: 2.6rem;
      word-break: break-all;
      transition: opacity .25s;
      text-shadow: 0 0 28px rgba(0,195,122,.35);
    }

    #result-value.empty { color: #252838; text-shadow: none; }

    /* ── CONVERT BTN ── */
    #convert-btn {
      width: 100%;
      padding: 1rem;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 28px rgba(0,195,122,.22);
      margin-bottom: .9rem;
    }

    #convert-btn:hover:not(:disabled) {
      background: #00e08a;
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(0,195,122,.38);
    }

    #convert-btn:active:not(:disabled) { transform:translateY(0); }
    #convert-btn:disabled { opacity:.5; cursor:not-allowed; }

    #error-msg { font-size:.68rem; color:var(--red); text-align:center; min-height:.9rem; }

    /* ── RATES GRID ── */
    .section-title {
      font-size: .58rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 1.8rem 0 .9rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    .rates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
      gap: .7rem;
    }

    .rate-tile {
      background: var(--inner);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .8rem .9rem;
      display: flex;
      flex-direction: column;
      gap: .35rem;
      transition: border-color .2s, transform .15s;
    }

    .rate-tile:hover { border-color: #2e3550; transform:translateY(-1px); }

    .rt-top { display:flex; align-items:center; gap:.45rem; }

    .flag-xs {
      width: 22px; height: 16px;
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.5);
    }

    .flag-xs svg { width:100%; height:100%; display:block; }

    .rt-code  { font-family:'Syne',sans-serif; font-size:.75rem; font-weight:700; }
    .rt-rate  { font-family:'Bebas Neue',sans-serif; font-size:1.35rem; letter-spacing:.04em; color:var(--green); text-shadow:0 0 16px rgba(0,195,122,.3); }
    .rt-label { font-size:.55rem; color:var(--muted); letter-spacing:.06em; }
    .rt-rate.loading { color:var(--border); text-shadow:none; }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(0,0,0,.25);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: .6rem;
      color: var(--muted);
      letter-spacing: .07em;
      line-height: 1.9;
      max-width: 640px;
      animation: fadeUp .7s .4s ease both;
    }

    footer a { color: var(--gold); text-decoration:none; }
    footer a:hover { text-decoration:underline; }

    /* ── KEYFRAMES ── */
    @keyframes fadeDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes dropIn   { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pop      { 0%{transform:scale(1)} 40%{transform:scale(1.04)} 100%{transform:scale(1)} }

    .pop { animation: pop .28s ease; }

    /* dropdown uses document click to close — no overlay needed */

    @media (max-width: 480px) {
      .input-row { grid-template-columns: 1fr; }
      .selectors-row { grid-template-columns: 1fr 38px 1fr; gap:.5rem; }
      .rates-grid { grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); }
    }
  </style>
</head>
<body>

<header>
  <div class="badge"><span class="badge-dot"></span>Projeto Intermediário</div>
  <h1>Conversor de<br><span class="accent">Moedas</span></h1>
  <p class="subtitle">BRL · USD · EUR · GBP · CHF &nbsp;·&nbsp; Cotação em tempo real</p>
</header>

<!-- RATE BAR -->
<div class="rate-bar">
  <div class="live-dot"></div>
  <span id="bar-rates">Carregando cotações…</span>
</div>

<!-- CARD -->
<div class="card">

  <!-- SELECTORS -->
  <div class="selectors-row">

    <!-- FROM -->
    <div class="selector-wrap" id="from-wrap">
      <div class="selector-label">De</div>
      <button class="selector-btn" id="from-btn" type="button">
        <div class="flag-md" id="from-flag-md"></div>
        <div class="sel-info">
          <div class="sel-code" id="from-code">BRL</div>
          <div class="sel-name" id="from-name">Real Brasileiro</div>
        </div>
        <span class="sel-arrow">▾</span>
      </button>
      <div class="dropdown" id="from-dropdown"></div>
    </div>

    <!-- SWAP -->
    <button id="swap-btn" type="button" title="Inverter moedas">⇅</button>

    <!-- TO -->
    <div class="selector-wrap" id="to-wrap">
      <div class="selector-label">Para</div>
      <button class="selector-btn" id="to-btn" type="button">
        <div class="flag-md" id="to-flag-md"></div>
        <div class="sel-info">
          <div class="sel-code" id="to-code">USD</div>
          <div class="sel-name" id="to-name">Dólar Americano</div>
        </div>
        <span class="sel-arrow">▾</span>
      </button>
      <div class="dropdown" id="to-dropdown"></div>
    </div>

  </div>

  <!-- INPUT + RESULT -->
  <div class="input-row">
    <div class="amount-field">
      <label>Valor</label>
      <input class="amount-input" type="number" id="amount-input" placeholder="0" min="0" step="any"/>
    </div>
    <div class="result-wrap">
      <label>Resultado</label>
      <div id="result-value" class="empty">—</div>
    </div>
  </div>

  <button id="convert-btn" disabled>Aguardando cotações…</button>
  <div id="error-msg"></div>

  <!-- RATES TILES -->
  <div class="section-title">Cotações em relação ao BRL</div>
  <div class="rates-grid" id="rates-grid"></div>

</div>

<footer>
  API: <a href="https://economia.awesomeapi.com.br" target="_blank" rel="noopener">AwesomeAPI — economia.awesomeapi.com.br</a>
  &nbsp;·&nbsp; Dados com delay de ~5 min · Atualização automática a cada 5 min
</footer>

<script>
/* ================================================================
   FLAGS — SVG inline por código de moeda / país
================================================================ */
const FLAGS = {

  BRL: `<svg viewBox="0 0 380 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="380" height="200" fill="#009C3B"/>
    <polygon points="190,14 366,100 190,186 14,100" fill="#FFDF00"/>
    <circle cx="190" cy="100" r="50" fill="#002776"/>
    <path d="M153,86 Q190,73 227,86" stroke="#fff" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <text x="190" y="111" text-anchor="middle" fill="#fff" font-size="20"
      font-family="Arial Black,sans-serif" font-weight="900" letter-spacing="3.5">BRASIL</text>
  </svg>`,

  USD: `<svg viewBox="0 0 380 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="380" height="200" fill="#B22234"/>
    <rect y="15.4"  width="380" height="15.4" fill="#fff"/>
    <rect y="46.2"  width="380" height="15.4" fill="#fff"/>
    <rect y="77"    width="380" height="15.4" fill="#fff"/>
    <rect y="107.8" width="380" height="15.4" fill="#fff"/>
    <rect y="138.6" width="380" height="15.4" fill="#fff"/>
    <rect y="169.4" width="380" height="15.4" fill="#fff"/>
    <rect width="152" height="107.7" fill="#3C3B6E"/>
    <g fill="#fff">
      ${(()=>{let s='';for(let r=0;r<9;r++)for(let c=0;c<(r%2===0?6:5);c++)
        s+=`<circle cx="${r%2===0?8+c*22:19+c*22}" cy="${9+r*11.6}" r="3.5"/>`;return s;})()}
    </g>
  </svg>`,

  EUR: `<svg viewBox="0 0 380 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="380" height="200" fill="#003399"/>
    <g fill="#FFCC00">
      ${(()=>{let s='';for(let i=0;i<12;i++){
        const a=i*(Math.PI/6)-(Math.PI/2);
        const x=190+70*Math.cos(a), y=100+70*Math.sin(a);
        /* 5-pointed star */
        let pts='';for(let k=0;k<5;k++){
          const o=k*72*(Math.PI/180)-(Math.PI/2);
          const o2=o+36*(Math.PI/180);
          pts+=`${x+8*Math.cos(o).toFixed(3)},${y+8*Math.sin(o).toFixed(3)} `;
          pts+=`${x+3.5*Math.cos(o2).toFixed(3)},${y+3.5*Math.sin(o2).toFixed(3)} `;
        }
        s+=`<polygon points="${pts.trim()}"/>`;
      }return s;})()}
    </g>
  </svg>`,

  GBP: `<svg viewBox="0 0 380 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="380" height="200" fill="#012169"/>
    <!-- diagonals white -->
    <line x1="0" y1="0" x2="380" y2="200" stroke="#fff" stroke-width="40"/>
    <line x1="380" y1="0" x2="0" y2="200" stroke="#fff" stroke-width="40"/>
    <!-- diagonals red -->
    <line x1="0" y1="0" x2="380" y2="200" stroke="#C8102E" stroke-width="24"/>
    <line x1="380" y1="0" x2="0" y2="200" stroke="#C8102E" stroke-width="24"/>
    <!-- cross white -->
    <rect x="152" y="0" width="76" height="200" fill="#fff"/>
    <rect x="0" y="62" width="380" height="76" fill="#fff"/>
    <!-- cross red -->
    <rect x="166" y="0" width="48" height="200" fill="#C8102E"/>
    <rect x="0" y="76" width="380" height="48" fill="#C8102E"/>
  </svg>`,

  CHF: `<svg viewBox="0 0 380 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="380" height="200" fill="#FF0000"/>
    <!-- white cross -->
    <rect x="155" y="50"  width="70" height="100" fill="#fff"/>
    <rect x="115" y="75"  width="150" height="50"  fill="#fff"/>
  </svg>`,
};

/* ================================================================
   CURRENCY CONFIG
================================================================ */
const CURRENCIES = {
  BRL: { code:'BRL', name:'Real Brasileiro',    symbol:'R$', flag:'BRL' },
  USD: { code:'USD', name:'Dólar Americano',     symbol:'$',  flag:'USD' },
  EUR: { code:'EUR', name:'Euro',                symbol:'€',  flag:'EUR' },
  GBP: { code:'GBP', name:'Libra Esterlina',     symbol:'£',  flag:'GBP' },
  CHF: { code:'CHF', name:'Franco Suíço',        symbol:'Fr', flag:'CHF' },
};

const PAIRS = ['USD-BRL','EUR-BRL','GBP-BRL','CHF-BRL'];
// rates[X] = 1 X in BRL
let rates = {};
let fromCur = 'BRL';
let toCur   = 'USD';

/* ================================================================
   AWESOMEAPI FETCH
   https://economia.awesomeapi.com.br/json/last/{pairs}
================================================================ */
async function fetchRates() {
  const query = PAIRS.join(',');
  const res   = await fetch(`https://economia.awesomeapi.com.br/json/last/${query}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();

  PAIRS.forEach(pair => {
    const key = pair.replace('-','');
    if (data[key]) {
      const [from] = pair.split('-');
      rates[from] = parseFloat(data[key].bid); // BRL per 1 unit of from
    }
  });
  rates['BRL'] = 1;
}

/* ================================================================
   CONVERT between any two currencies via BRL pivot
================================================================ */
function convert(amount, from, to) {
  if (!rates[from] || !rates[to]) return null;
  const inBRL = from === 'BRL' ? amount : amount * rates[from];
  return to === 'BRL' ? inBRL : inBRL / rates[to];
}

/* ================================================================
   RENDER SELECTOR BUTTON
================================================================ */
function renderSelector(side) {
  const code = side === 'from' ? fromCur : toCur;
  const cur  = CURRENCIES[code];
  document.getElementById(`${side}-code`).textContent = cur.code;
  document.getElementById(`${side}-name`).textContent = cur.name;
  document.getElementById(`${side}-flag-md`).innerHTML = FLAGS[cur.flag] || '';
}

/* ================================================================
   DROPDOWNS — close via document, no overlay blocking clicks
================================================================ */
let openDropdown = null;

function closeAll() {
  document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.selector-btn').forEach(b => b.classList.remove('open'));
  openDropdown = null;
}

function selectCurrency(side, code) {
  const other = side === 'from' ? 'to' : 'from';
  // if same as opposite side, swap them first
  if (code === (side === 'from' ? toCur : fromCur)) {
    if (side === 'from') toCur   = fromCur;
    else                 fromCur = toCur;
  }
  if (side === 'from') fromCur = code;
  else                 toCur   = code;

  renderSelector('from');
  renderSelector('to');
  closeAll();
  updateResult();
}

function buildDropdown(side) {
  const dd  = document.getElementById(`${side}-dropdown`);
  const btn = document.getElementById(`${side}-btn`);

  // toggle: if same dropdown clicked again, close
  if (openDropdown === side) { closeAll(); return; }
  closeAll();
  openDropdown = side;

  dd.innerHTML = '';
  const currentCode = side === 'from' ? fromCur : toCur;

  Object.values(CURRENCIES).forEach(c => {
    const item = document.createElement('div');
    item.className = 'dd-item' + (c.code === currentCode ? ' active' : '');
    item.innerHTML = `<div class="flag-sm">${FLAGS[c.flag] || ''}</div>
      <span class="dd-code">${c.code}</span>
      <span class="dd-name">${c.name}</span>`;

    // mousedown fires before blur/document-click, ensuring selection registers
    item.addEventListener('mousedown', (e) => {
      e.preventDefault(); // prevent input blur side-effects
      e.stopPropagation();
      selectCurrency(side, c.code);
    });

    // touch support
    item.addEventListener('touchend', (e) => {
      e.preventDefault();
      e.stopPropagation();
      selectCurrency(side, c.code);
    });

    dd.appendChild(item);
  });

  dd.classList.add('open');
  btn.classList.add('open');
}

// open dropdowns on click — stopPropagation so document handler doesn't immediately close
document.getElementById('from-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  buildDropdown('from');
});

document.getElementById('to-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  buildDropdown('to');
});

// clicking anywhere outside closes open dropdown
document.addEventListener('click', () => { if (openDropdown) closeAll(); });

/* ================================================================
   SWAP
================================================================ */
document.getElementById('swap-btn').addEventListener('click', () => {
  [fromCur, toCur] = [toCur, fromCur];
  renderSelector('from');
  renderSelector('to');
  updateResult();
});

/* ================================================================
   CONVERT & RESULT
================================================================ */
function updateResult() {
  const val = parseFloat(document.getElementById('amount-input').value);
  const rv  = document.getElementById('result-value');
  if (!val || isNaN(val) || val < 0) {
    rv.textContent = '—';
    rv.className = 'empty';
    return;
  }
  const converted = convert(val, fromCur, toCur);
  if (converted === null) { rv.textContent = '—'; rv.className='empty'; return; }
  const sym = CURRENCIES[toCur].symbol;
  rv.textContent = `${sym} ${converted.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}`;
  rv.className = 'pop';
}

function doConvert() {
  document.getElementById('error-msg').textContent = '';
  const val = parseFloat(document.getElementById('amount-input').value);
  if (!document.getElementById('amount-input').value.trim() || isNaN(val) || val < 0) {
    document.getElementById('error-msg').textContent = '⚠ Insira um valor numérico válido.';
    return;
  }
  if (!Object.keys(rates).length) {
    document.getElementById('error-msg').textContent = '⚠ Cotações ainda carregando.';
    return;
  }
  const btn = document.getElementById('convert-btn');
  btn.innerHTML = '<span class="spinner"></span>Convertendo…';
  btn.disabled  = true;
  setTimeout(() => {
    updateResult();
    btn.textContent = 'Converter';
    btn.disabled    = false;
  }, 380);
}

document.getElementById('convert-btn').addEventListener('click', doConvert);
document.getElementById('amount-input').addEventListener('input', updateResult);
document.getElementById('amount-input').addEventListener('keydown', e => { if(e.key==='Enter') doConvert(); });

/* ================================================================
   RATES TILES
================================================================ */
function renderTiles() {
  const grid = document.getElementById('rates-grid');
  grid.innerHTML = '';
  ['USD','EUR','GBP','CHF'].forEach(code => {
    const cur  = CURRENCIES[code];
    const rate = rates[code];
    const tile = document.createElement('div');
    tile.className = 'rate-tile';
    tile.innerHTML = `
      <div class="rt-top">
        <div class="flag-xs">${FLAGS[cur.flag]||''}</div>
        <span class="rt-code">${code}</span>
      </div>
      <div class="rt-rate${rate?'':' loading'}" id="tile-${code}">
        ${rate ? `R$ ${rate.toFixed(4)}` : '…'}
      </div>
      <div class="rt-label">1 ${code} em reais</div>`;
    grid.appendChild(tile);
  });
}

function updateTiles() {
  ['USD','EUR','GBP','CHF'].forEach(code => {
    const el = document.getElementById(`tile-${code}`);
    if (!el) return;
    el.className = 'rt-rate';
    el.textContent = rates[code] ? `R$ ${rates[code].toFixed(4)}` : '—';
  });
}

/* ================================================================
   RATE BAR
================================================================ */
function renderBar() {
  const parts = Object.entries(rates)
    .filter(([k]) => k !== 'BRL')
    .map(([k,v]) => `<span class="bar-pair"><span class="bar-val">1 ${k} = R$ ${v.toFixed(2)}</span></span>`)
    .join('<span style="color:var(--border)"> · </span>');
  document.getElementById('bar-rates').innerHTML = parts || 'Erro ao carregar';
}

/* ================================================================
   LOAD DATA
================================================================ */
async function loadData() {
  try {
    await fetchRates();
    renderTiles();
    updateTiles();
    renderBar();
    const btn = document.getElementById('convert-btn');
    btn.textContent = 'Converter';
    btn.disabled    = false;
    updateResult();
  } catch (err) {
    document.getElementById('bar-rates').textContent = 'Erro ao carregar cotações';
    document.getElementById('bar-rates').style.color = 'var(--red)';
    document.getElementById('rates-grid').innerHTML  =
      '<p style="font-size:.7rem;color:var(--red);grid-column:1/-1">Falha ao conectar à API AwesomeAPI</p>';
    console.error('AwesomeAPI error:', err);
  }
}

/* ================================================================
   BOOT
================================================================ */
renderSelector('from');
renderSelector('to');
renderTiles();
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
